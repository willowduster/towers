<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TOWERS — doom/sludge metal. Live stream, music, and more." />
  <title>TOWERS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Josefin+Sans:wght@100;300;400&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loader" aria-hidden="true">
    <div class="loader-inner">
      <div class="loader-logo">
        <img src="towers_logo_web.png" alt="TOWERS logo" class="loader-logo-img" />
      </div>
      <div class="loader-bar"><span class="loader-fill"></span></div>
    </div>
  </div>

  <!-- Site Wrapper -->
  <div id="site" class="site-hidden">

    <header class="site-header">
      <div class="header-inner">
        <img src="towers_logo_white_150.png" alt="TOWERS" class="header-logo" />
      </div>
    </header>

    <main>

      <!-- Live Stream -->
      <section id="stream" class="stream-section">
        <div class="stream-wrapper">
          <div id="stream-offline" class="stream-offline">
            <img src="towers_logo_web.png" alt="TOWERS" class="stream-offline-logo" />
            <p class="stream-offline-text">not currently live</p>
          </div>
          <video
            id="stream-video"
            class="stream-video stream-video-hidden"
            controls
            autoplay
            muted
            playsinline
          ></video>
          <div id="unmute-overlay" class="unmute-overlay unmute-overlay-hidden">
            <button id="unmute-btn" class="unmute-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20" aria-hidden="true">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"/>
                <line x1="23" y1="9" x2="17" y2="15"/>
                <line x1="17" y1="9" x2="23" y2="15"/>
              </svg>
              tap to unmute
            </button>
          </div>
        </div>
      </section>

    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-links">
          <!-- Replace href values with your actual profile URLs -->
          <a
            href="https://www.instagram.com/towers.music"
            target="_blank"
            rel="noopener noreferrer"
            class="footer-link"
            aria-label="towers on Instagram"
          >
            <svg class="footer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
              <circle cx="12" cy="12" r="4"/>
              <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
            </svg>
            Instagram
          </a>
          <span class="footer-sep" aria-hidden="true">—</span>
          <a
            href="https://www.youtube.com/@towers_music"
            target="_blank"
            rel="noopener noreferrer"
            class="footer-link"
            aria-label="towers on YouTube"
          >
            <svg class="footer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.96-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/>
              <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/>
            </svg>
            YouTube
          </a>
        </div>
        <p class="footer-copy">
          &copy; <span id="year"></span> towers. all rights reserved.
        </p>
      </div>
    </footer>

  </div><!-- /site -->

  <script src="script.js"></script>
</body>
</html>
